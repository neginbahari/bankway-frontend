<section class="securities-table">
  <h2 class="securities-table__section-title">List of Securities</h2>

  <div class="securities-table__toolbar" [formGroup]="toolbarForm">
    <div class="securities-table__toolbar-start">
      <button type="button" class="btn btn--outline">
        <span>Setting</span>
        <img src="assets/icons/setting-outline.svg" alt="" width="16" height="16" />
      </button>
      <button type="button" class="btn btn--outline">
        <span>File</span>
        <img src="assets/icons/excel.svg" alt="" width="16" height="16" />
      </button>
    </div>

    <div class="securities-table__toolbar-end">
      <button type="button" class="btn btn--brand-icon" aria-label="Filter">
        <img src="assets/icons/filter.svg" alt="" width="20" height="20" />
      </button>
      <div class="securities-table__search-group">
        <button type="button" class="btn btn--brand" (click)="onSearch()">search</button>
        <label class="input-v2">
          <span class="input-v2__body">
            <span class="input-v2__content">
              <input
                class="input-v2__field"
                type="text"
                formControlName="code"
                placeholder="code"
                aria-label="Search by code"
              />
              <img src="assets/icons/search.svg" alt="" class="input-v2__icon" width="16" height="16" />
            </span>
          </span>
        </label>
      </div>
    </div>
  </div>

  <div class="securities-table__bordered">
  <div class="securities-table__grid-wrapper">
    <table
      mat-table
      [dataSource]="rows()"
      class="securities-table__mat-table"
      aria-label="List of securities"
    >
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="col-actions"></th>
        <td mat-cell *matCellDef="let row" class="col-actions">
          <button type="button" class="icon-btn" aria-label="Row actions">
            <img src="assets/icons/more-vertical.svg" alt="" width="16" height="16" />
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <app-status-badge [label]="row.status" />
        </td>
      </ng-container>

      <ng-container matColumnDef="currency4">
        <th mat-header-cell *matHeaderCellDef>currency</th>
        <td mat-cell *matCellDef="let row">{{ row.currency4 }}</td>
      </ng-container>

      <ng-container matColumnDef="currency3">
        <th mat-header-cell *matHeaderCellDef>currency</th>
        <td mat-cell *matCellDef="let row">{{ row.currency3 }}</td>
      </ng-container>

      <ng-container matColumnDef="currency2">
        <th mat-header-cell *matHeaderCellDef>currency</th>
        <td mat-cell *matCellDef="let row">{{ row.currency2 }}</td>
      </ng-container>

      <ng-container matColumnDef="currency1">
        <th mat-header-cell *matHeaderCellDef>currency</th>
        <td mat-cell *matCellDef="let row">{{ row.currency1 }}</td>
      </ng-container>

      <ng-container matColumnDef="market">
        <th mat-header-cell *matHeaderCellDef>market</th>
        <td mat-cell *matCellDef="let row">{{ row.market }}</td>
      </ng-container>

      <ng-container matColumnDef="row">
        <th mat-header-cell *matHeaderCellDef>
          <label class="row-checkbox row-checkbox--header">
            <span class="row-checkbox__label">row</span>
            <input
              type="checkbox"
              class="row-checkbox__native"
              [formControl]="headerSelectAll"
              (change)="toggleAllRows()"
            />
            <span class="row-checkbox__box" aria-hidden="true"></span>
          </label>
        </th>
        <td mat-cell *matCellDef="let row">
          <label class="row-checkbox">
            <span class="row-checkbox__meta">
              <span class="row-checkbox__optional">{{ row.field.requirementText }}</span>
              <span class="row-checkbox__name">{{ row.field.label }}</span>
            </span>
            <input
              type="checkbox"
              class="row-checkbox__native"
              [checked]="isRowSelected(row)"
              (change)="toggleRow(row)"
            />
            <span class="row-checkbox__box" aria-hidden="true"></span>
          </label>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  <footer class="securities-table__footer">
    <div class="pagination">
      <div class="pagination__controls pagination__controls--next">
        <button type="button" class="pagination__btn" aria-label="First page">
          <img src="assets/icons/arrow-left.svg" alt="" width="16" height="16" />
        </button>
        <button type="button" class="pagination__btn" aria-label="Previous page">
          <img src="assets/icons/arrow-left-single.svg" alt="" width="16" height="16" />
        </button>
      </div>
      <p class="pagination__summary">{{ pageSummary() }}</p>
      <div class="pagination__controls pagination__controls--prev">
        <button type="button" class="pagination__btn pagination__btn--disabled" disabled aria-label="Next page">
          <img src="assets/icons/arrow-right.svg" alt="" width="16" height="16" />
        </button>
        <button type="button" class="pagination__btn pagination__btn--disabled" disabled aria-label="Last page">
          <img src="assets/icons/arrow-right-double.svg" alt="" width="16" height="16" />
        </button>
      </div>
    </div>

    <label class="dropdown-input" [formGroup]="toolbarForm">
      <span class="dropdown-input__floating">تعداد سطرها</span>
      <span class="dropdown-input__field-wrap">
        <input class="dropdown-input__field" type="text" formControlName="pageSize" aria-label="تعداد سطرها" />
        <img src="assets/icons/arrow-up.svg" alt="" class="dropdown-input__chevron" width="16" height="16" />
      </span>
    </label>
  </footer>
  </div>
</section>
